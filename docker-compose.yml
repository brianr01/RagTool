version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingest-worker:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - ./data:/app/data
      - ./shared:/app/shared
      - ./ingest:/app/ingest
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://ollama:11434
      DATA_DIR: /app/data
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8200:8200"
    volumes:
      - ./shared:/app/shared
      - ./mcp_server:/app/mcp_server
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  test-runner:
    build:
      context: .
      dockerfile: tests/Dockerfile
    volumes:
      - ./tests:/app/tests
      - ./shared:/app/shared
      - ./ingest:/app/ingest
      - ./mcp_server:/app/mcp_server
      - ./data:/app/data
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://ollama:11434
      INGEST_URL: http://ingest-worker:8100
      MCP_URL: http://mcp-server:8200
      DATA_DIR: /app/data
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ingest-worker:
        condition: service_started
      mcp-server:
        condition: service_started
    profiles: ["test"]

volumes:
  pgdata:
  ollama_data:
